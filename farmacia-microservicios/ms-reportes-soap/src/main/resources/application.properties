server.port=8004
spring.application.name=ms-reportes-soap

# ======== Eureka ========
eureka.client.service-url.defaultZone=http://localhost:8000/eureka/
eureka.instance.prefer-ip-address=true

# ======== MySQL ========
spring.datasource.url=jdbc:mysql://localhost:3306/farmacia_reportes?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=farmacia_user
spring.datasource.password=farmacia2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======== JPA / Hibernate ========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
